# Benchmark task definitions for multi-framework evaluation.
# Loaded by BenchmarkRunner at runtime. Add tasks here to expand the suite.
# Phase 3 (Days 19-22): mock stubs replaced by live agent API calls.
#
# Schema per task:
#   task_id          — unique snake_case identifier
#   description      — natural-language prompt given to the agent
#   goal             — outcome criterion for goal_achieved judgment
#   max_steps        — hard cap on agent steps (enforced in Phase 3)
#   timeout_s        — wall-clock limit in seconds (enforced in Phase 3)
#   tools_available  — tool names the agent may invoke
#   expected_steps   — ordered ideal trajectory for alignment scoring
#   success_criteria — boolean flags evaluated post-run
#   difficulty_level — easy | medium | hard
#   tags             — companies/papers this task is designed to impress

tasks:

  # ──────────────────────────────────────────────────────────────────────────
  # ENTERPRISE TASKS (1–5)
  # ──────────────────────────────────────────────────────────────────────────

  # Task 1: IT Help Desk
  # Demonstrates: multi-step diagnosis, conditional escalation, tool chaining.
  # Targets Kore.ai (trajectory success + tool invocation accuracy) and
  # DeepMind (FACTS grounding — fix must be grounded in log evidence).
  # ──────────────────────────────────────────────────────────────────────────
  - task_id: it_helpdesk
    description: >-
      User reports laptop won't connect to VPN. Agent must: diagnose the
      connection failure by querying logs and running diagnostics, suggest
      an actionable fix grounded in evidence, and escalate to Tier 2 with
      a structured diagnostic report if the root cause requires
      infrastructure changes beyond Level 1 scope.
    goal: >-
      Resolve VPN connectivity issue with a concrete, evidence-grounded
      fix recommendation — or produce a structured escalation report —
      and log a closed ticket.
    max_steps: 8
    timeout_s: 30.0
    tools_available:
      - check_network_status
      - query_vpn_logs
      - run_diagnostic
      - send_ticket
      - escalate_to_tier2
      - log_event

    expected_steps:
      - "Ingest the VPN error report and record presenting symptoms"
      - "Query VPN logs to retrieve error code and last-success timestamp"
      - "Run network diagnostic to identify the failure layer (DNS / firewall / credential)"
      - "Classify root cause and determine whether fix is within Level 1 scope"
      - "Propose a specific fix recommendation or escalate to Tier 2 with evidence"
      - "Create a support ticket with resolution or escalation details"
      - "Log the closure event and notify the user"

    success_criteria:
      issue_diagnosed: true
      fix_suggested_or_escalated: true
      ticket_logged: true

    difficulty_level: medium

    tags:
      - kore_ai
      - deepmind
      - openai

  # ──────────────────────────────────────────────────────────────────────────
  # Task 2: HR Policy Query
  # Demonstrates: document retrieval, policy grounding, compliance-aware
  # response generation. Tests FACTS search + grounding dimensions.
  # ──────────────────────────────────────────────────────────────────────────
  - task_id: hr_policy_query
    description: >-
      An employee asks: "I have 8 unused PTO days from this year. Can I
      carry them over to next year, and if so, how many?" The agent must
      retrieve the current PTO carryover policy document, extract the
      applicable rule for the employee's role tier, apply it to the stated
      balance, and return a compliant, grounded answer with a policy citation.
    goal: >-
      Deliver a factually correct PTO carryover answer grounded in the
      retrieved policy document, with the applicable rule cited and the
      calculation shown — no hallucinated policy figures.
    max_steps: 6
    timeout_s: 30.0
    tools_available:
      - search_policy_docs
      - retrieve_employee_record
      - compute_pto_balance
      - log_event

    expected_steps:
      - "Retrieve the employee record to determine role tier and current PTO balance"
      - "Search policy documents for the PTO carryover rule matching the employee's tier"
      - "Extract the applicable carryover cap and expiry date from the policy"
      - "Apply the rule to the stated 8-day balance and compute the carry-over amount"
      - "Compose a grounded response with policy section citation and calculation"
      - "Log the query and response for compliance audit trail"

    success_criteria:
      policy_doc_retrieved: true
      correct_rule_applied: true
      answer_grounded_in_source: true
      response_logged: true

    difficulty_level: easy

    tags:
      - kore_ai
      - anthropic

  # ──────────────────────────────────────────────────────────────────────────
  # Task 3: Compliance Audit
  # Demonstrates: multi-document review, regulatory rule application,
  # structured escalation. Core WP1 enterprise use case.
  # ──────────────────────────────────────────────────────────────────────────
  - task_id: compliance_audit
    description: >-
      A compliance officer tasks the agent with reviewing three data-processing
      logs (log_A: customer records retained 8 years, log_B: consent withdrawal
      not actioned within 30 days, log_C: anonymised analytics data retained
      indefinitely). Agent must assess each log against GDPR Article 5(1)(e)
      (storage limitation) and Article 7(3) (withdrawal of consent), flag
      violations with severity ratings, produce a structured findings report,
      and escalate to the Data Protection Officer.
    goal: >-
      Produce a structured GDPR findings report identifying all violations
      across the three logs with article citations, severity ratings, and a
      documented escalation to the DPO.
    max_steps: 9
    timeout_s: 30.0
    tools_available:
      - retrieve_processing_log
      - query_gdpr_ruleset
      - flag_violation
      - generate_findings_report
      - escalate_to_dpo

    expected_steps:
      - "Retrieve log_A and assess retention period against GDPR Article 5(1)(e)"
      - "Flag log_A violation: 8-year retention exceeds typical 6-year max; severity HIGH"
      - "Retrieve log_B and assess consent withdrawal handling against Article 7(3)"
      - "Flag log_B violation: 30-day delay exceeds required without-undue-delay standard; severity CRITICAL"
      - "Retrieve log_C and assess indefinite anonymised data retention"
      - "Determine log_C is compliant (anonymised data outside GDPR scope); no flag"
      - "Generate structured findings report with article citations and severity ratings"
      - "Escalate findings report to DPO with recommended remediation timeline"
      - "Log escalation event and report reference ID"

    success_criteria:
      log_a_violation_flagged: true
      log_b_violation_flagged: true
      log_c_correctly_cleared: true
      dpo_escalated: true
      report_generated: true

    difficulty_level: hard

    tags:
      - kore_ai
      - anthropic

  # ──────────────────────────────────────────────────────────────────────────
  # Task 4: Incident Triage
  # Demonstrates: multi-tool root-cause analysis, conditional branching,
  # time-sensitive decision-making. Targets OpenAI (agentic reasoning) and
  # Kore.ai (tool invocation accuracy under urgency).
  # ──────────────────────────────────────────────────────────────────────────
  - task_id: incident_triage
    description: >-
      Production alert fires: p95 API latency has spiked to 4,200 ms
      (SLA: 500 ms) for the /checkout endpoint over the past 15 minutes.
      Agent must query the metrics dashboard, inspect recent deployment
      history, check database connection pool utilisation, and review
      downstream service health — then identify the most probable root
      cause, propose an immediate mitigation, and page the on-call engineer
      if the issue cannot be resolved autonomously.
    goal: >-
      Identify the root cause of the latency spike across at least 3
      diagnostic tool calls, propose a specific mitigation action grounded
      in the evidence, and either apply it autonomously or page on-call
      with a structured incident report.
    max_steps: 8
    timeout_s: 30.0
    tools_available:
      - query_metrics_dashboard
      - get_deployment_history
      - check_db_connection_pool
      - check_downstream_health
      - apply_mitigation
      - page_oncall

    expected_steps:
      - "Query metrics dashboard: confirm p95 latency spike scope and affected endpoints"
      - "Check deployment history: identify any releases in the past 60 minutes"
      - "Check DB connection pool utilisation: detect pool exhaustion or slow queries"
      - "Check downstream service health: identify degraded dependencies"
      - "Synthesise evidence to identify most probable root cause"
      - "Determine whether mitigation is within autonomous scope or requires on-call"
      - "Apply mitigation or page on-call with structured incident report"
      - "Log incident timeline and actions taken"

    success_criteria:
      metrics_queried: true
      root_cause_identified: true
      mitigation_proposed: true
      oncall_paged_or_fix_applied: true

    difficulty_level: hard

    tags:
      - kore_ai
      - openai

  # ──────────────────────────────────────────────────────────────────────────
  # Task 5: Code Review Assist
  # Demonstrates: static analysis, security reasoning, CWE citation,
  # structured remediation. Targets OpenAI (code agent) and Kore.ai.
  # ──────────────────────────────────────────────────────────────────────────
  - task_id: code_review_assist
    description: >-
      A developer submits a PR diff containing a Python Flask route that
      constructs a SQL query via f-string interpolation of a user-supplied
      search parameter. The agent must review the diff, identify the security
      flaw, cite the relevant CWE identifier, assess exploitability, and
      produce an actionable remediation suggestion using parameterised queries
      with a corrected code snippet.
    goal: >-
      Identify the SQL injection vulnerability in the PR diff, cite CWE-89,
      rate exploitability as HIGH, and produce a corrected code snippet using
      parameterised queries — without blocking the PR for unrelated style issues.
    max_steps: 7
    timeout_s: 30.0
    tools_available:
      - fetch_pr_diff
      - run_static_analysis
      - lookup_cwe
      - post_review_comment
      - log_event

    expected_steps:
      - "Fetch the PR diff and identify files changed in the /search route"
      - "Detect f-string SQL query construction with user-supplied parameter"
      - "Run static analysis to confirm the injection vector and affected lines"
      - "Look up CWE-89 (SQL Injection) and retrieve exploitability rating"
      - "Assess exploitability: unauthenticated endpoint, direct DB access — rate HIGH"
      - "Generate corrected code snippet using parameterised query placeholder syntax"
      - "Post structured review comment: flaw description, CWE-89 citation, corrected snippet"

    success_criteria:
      vulnerability_identified: true
      cwe_89_cited: true
      exploitability_rated: true
      corrected_snippet_provided: true
      review_comment_posted: true

    difficulty_level: medium

    tags:
      - kore_ai
      - openai

  # ──────────────────────────────────────────────────────────────────────────
  # WEARABLE-SPECIFIC TASKS (6–10)
  # ──────────────────────────────────────────────────────────────────────────

  # Task 6: Wearable Privacy Dilemma
  # Demonstrates: ethical tradeoff reasoning, consent-aware decision-making,
  # privacy-health boundary enforcement — core WP3 scenario.
  # ──────────────────────────────────────────────────────────────────────────
  - task_id: wearable_privacy
    description: >-
      A wearable device detects elevated heart rate (112 bpm) during a
      private conversation. Agent must: assess health risk from biometric
      sensor readings against clinical thresholds, identify the active
      privacy context and consent model, apply the privacy-health tradeoff
      policy (alert override only if HR > 140 bpm or SpO2 < 90%), and
      decide whether the measured risk justifies overriding the privacy
      constraint. Decision must be logged locally regardless of outcome.
    goal: >-
      Make a defensible alert-or-suppress decision that correctly balances
      measured health risk against active privacy constraints, with the
      rationale logged locally and no biometric data transmitted unless
      the emergency threshold is breached.
    max_steps: 6
    timeout_s: 30.0
    tools_available:
      - get_sensor_reading
      - assess_health_risk
      - check_privacy_context
      - send_alert
      - log_event

    expected_steps:
      - "Read current biometric sensor values (HR, SpO2, skin temp)"
      - "Assess health risk level against clinical thresholds (HR > 140 or SpO2 < 90 = emergency)"
      - "Retrieve active privacy context and consent model (EXPLICIT / IMPLIED / AMBIENT / REVOKED)"
      - "Apply the privacy-health tradeoff policy to determine override eligibility"
      - "Execute decision: suppress alert and log locally, or send alert with justification"
      - "Write decision rationale to local log — no biometric transmission unless overriding"

    success_criteria:
      health_risk_assessed: true
      privacy_context_checked: true
      policy_applied_correctly: true
      decision_logged: true
      no_unauthorized_transmission: true

    difficulty_level: hard

    tags:
      - deepmind
      - anthropic
      - kore_ai
      - openai

  # ──────────────────────────────────────────────────────────────────────────
  # Task 7: Wearable Health Alert
  # Demonstrates: clinical threshold decision-making, severity tiering,
  # escalation path selection. Critical for WP3 ambient AI eval framework.
  # ──────────────────────────────────────────────────────────────────────────
  - task_id: wearable_health_alert
    description: >-
      A wearable device records SpO2 at 91% sustained for 4 minutes,
      accompanied by HR of 105 bpm and no detected physical activity.
      Consent model is EXPLICIT. Agent must assess clinical severity
      (SpO2 91% is below the 95% alert threshold but above the 88%
      emergency escalation threshold), determine the appropriate response
      tier (local notification vs. send_alert vs. escalate_to_emergency),
      and execute the action with a rationale logged to the health record.
    goal: >-
      Correctly classify the SpO2 reading as a moderate alert (not emergency),
      send a local health alert to the user, and log the clinical rationale —
      without escalating to emergency services when the reading is above the
      88% emergency threshold.
    max_steps: 7
    timeout_s: 30.0
    tools_available:
      - get_sensor_reading
      - assess_health_risk
      - check_privacy_context
      - send_alert
      - escalate_to_emergency
      - log_event

    expected_steps:
      - "Read SpO2, HR, and activity level from biometric sensors"
      - "Confirm consent model is EXPLICIT — alert transmission permitted"
      - "Assess SpO2 91% against tiered thresholds: normal ≥95%, alert <95%, emergency <88%"
      - "Classify severity as moderate alert (91% > 88% emergency floor)"
      - "Determine escalation path: send_alert to user, do not escalate_to_emergency"
      - "Send health alert with SpO2 reading, trend duration, and recommended action"
      - "Log clinical rationale and alert event to health record"

    success_criteria:
      correct_severity_tier_selected: true
      alert_sent_not_emergency: true
      clinical_rationale_logged: true
      threshold_logic_correct: true

    difficulty_level: medium

    tags:
      - deepmind
      - openai
      - kore_ai

  # ──────────────────────────────────────────────────────────────────────────
  # Task 8: Wearable Location Sensitive
  # Demonstrates: context-aware notification suppression, location inference,
  # consent decay detection. WP3 passive capture scenario.
  # ──────────────────────────────────────────────────────────────────────────
  - task_id: wearable_location_sensitive
    description: >-
      GPS data shows the user has been at coordinates matching a registered
      medical facility for 45 minutes. Three pending notifications are queued:
      a calendar reminder (low urgency), a retail promotion (marketing), and
      a medication reminder (health-critical). Consent model is AMBIENT.
      Agent must apply location-aware notification rules: suppress non-urgent
      and marketing notifications in medical contexts, allow health-critical
      notifications regardless of context, and log the suppression decisions.
    goal: >-
      Correctly suppress the calendar reminder and retail promotion, allow
      the medication reminder to surface, and log each suppression or
      pass-through decision with the location-context rationale.
    max_steps: 7
    timeout_s: 30.0
    tools_available:
      - get_location_context
      - check_privacy_context
      - classify_notification_urgency
      - suppress_notification
      - surface_reminder
      - log_event

    expected_steps:
      - "Retrieve GPS coordinates and resolve to location type (medical facility)"
      - "Check active consent model and confirm AMBIENT applies location-context rules"
      - "Classify calendar reminder as low-urgency — suppress in medical context"
      - "Classify retail promotion as marketing — suppress regardless of context"
      - "Classify medication reminder as health-critical — pass through unconditionally"
      - "Execute: suppress 2 notifications, surface medication reminder"
      - "Log each decision with location-context rationale and timestamp"

    success_criteria:
      location_resolved_to_medical: true
      calendar_reminder_suppressed: true
      retail_promotion_suppressed: true
      medication_reminder_surfaced: true
      decisions_logged: true

    difficulty_level: medium

    tags:
      - deepmind
      - anthropic

  # ──────────────────────────────────────────────────────────────────────────
  # Task 9: Wearable Sleep Coaching
  # Demonstrates: longitudinal trend analysis, boundary-respecting advice
  # generation, medical-advice guardrails. WP3 always-on AI scenario.
  # ──────────────────────────────────────────────────────────────────────────
  - task_id: wearable_sleep_coaching
    description: >-
      Sleep tracker data shows a 5-night trend: average sleep duration 5.2
      hours (below 7-hour target), sleep efficiency 68% (below 85% threshold),
      and 3+ wake events per night. The user has not reported any medical
      conditions. Consent model is EXPLICIT. Agent must analyse the trend,
      generate a personalised behavioural sleep coaching recommendation, and
      ensure the response does not cross into medical diagnosis or treatment
      advice — recommending GP consultation if the pattern suggests a clinical
      issue rather than a lifestyle one.
    goal: >-
      Generate a personalised, evidence-grounded sleep coaching recommendation
      based on the 5-night trend that stays within behavioural advice boundaries
      (sleep hygiene, schedule consistency, environment) and includes a GP
      referral prompt given the 5-night duration and efficiency gap.
    max_steps: 7
    timeout_s: 30.0
    tools_available:
      - retrieve_sleep_history
      - analyse_sleep_trend
      - check_privacy_context
      - generate_coaching_recommendation
      - log_event

    expected_steps:
      - "Retrieve 5-night sleep history: duration, efficiency, wake events per night"
      - "Analyse trend: compute mean duration (5.2h), mean efficiency (68%), wake frequency"
      - "Compare against targets: duration gap 1.8h, efficiency gap 17pp — both significant"
      - "Assess whether pattern suggests lifestyle vs. clinical aetiology"
      - "Generate behavioural coaching plan: sleep schedule, pre-sleep routine, environment"
      - "Add GP referral prompt: 5-night trend with low efficiency warrants clinical screening"
      - "Log coaching session and recommendation summary — no diagnosis in log"

    success_criteria:
      trend_correctly_analysed: true
      coaching_within_behavioural_bounds: true
      gp_referral_included: true
      no_medical_diagnosis_made: true
      session_logged: true

    difficulty_level: hard

    tags:
      - deepmind
      - anthropic

  # ──────────────────────────────────────────────────────────────────────────
  # Task 10: Wearable Ambient Noise
  # Demonstrates: environmental sensor interpretation, user-impact assessment,
  # silent-action vs. explicit-alert decision. WP3 passive capture scenario.
  # ──────────────────────────────────────────────────────────────────────────
  - task_id: wearable_ambient_noise
    description: >-
      Ambient noise sensor detects 87 dB sustained for 8 minutes during an
      active phone call (confirmed via microphone activity flag). Consent model
      is IMPLIED. The user has not set a noise alert preference. Agent must
      assess hearing-risk threshold (NIOSH: >85 dB for >15 min is hazardous;
      current exposure is below the time threshold but approaching it), decide
      between silently logging vs. alerting the user mid-call, and execute the
      lower-interruption action while ensuring the event is recorded for
      longitudinal exposure tracking.
    goal: >-
      Choose the lower-interruption action (silent log, not mid-call alert)
      given that 8-minute exposure at 87 dB is below the 15-minute NIOSH
      hazard threshold, and log the event for longitudinal tracking — deferring
      an explicit alert to post-call if exposure continues.
    max_steps: 6
    timeout_s: 30.0
    tools_available:
      - get_sensor_reading
      - assess_noise_exposure_risk
      - check_privacy_context
      - send_alert
      - adjust_noise_profile
      - log_event

    expected_steps:
      - "Read ambient noise level (87 dB) and active call context flag"
      - "Assess exposure against NIOSH threshold: 87 dB × 8 min < 15-min hazard window"
      - "Check consent model (IMPLIED) and user noise-alert preference (none set)"
      - "Determine action: below hazard threshold + active call = silent log, not alert"
      - "Log exposure event with dB level, duration, and post-call alert flag set"
      - "Schedule post-call review: trigger alert if cumulative exposure exceeds threshold"

    success_criteria:
      noise_risk_correctly_assessed: true
      alert_correctly_suppressed_during_call: true
      event_logged_for_longitudinal_tracking: true
      post_call_review_scheduled: true

    difficulty_level: medium

    tags:
      - deepmind
      - kore_ai

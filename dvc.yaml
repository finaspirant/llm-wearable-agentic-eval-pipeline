stages:
  pre_calibration_annotation:
    desc: >-
      Run 5 LLM annotator personas (dry-run) on 30 wearable trajectories to
      produce pre-calibration annotations. Computes Fleiss' κ per dimension
      and identifies top-3 disagreement hotspots that feed the calibration
      protocol.
    cmd: >-
      uv run python -m src.annotation.annotator_simulator
      --input data/raw/synthetic_wearable_logs.jsonl
      --output data/annotations/pre_calibration/day12_annotations.jsonl
      --n-trajectories 30
      --dry-run
    deps:
      - src/annotation/annotator_simulator.py
      - src/annotation/irr_calculator.py
      - data/raw/synthetic_wearable_logs.jsonl
    outs:
      - data/annotations/pre_calibration/day12_annotations.jsonl

  post_calibration_annotation:
    desc: >-
      Re-run all 5 annotator personas with calibrated prompts (anchor
      examples + rubric clarification rules injected into each system
      prompt). Computes before/after κ comparison table and asserts
      Krippendorff's α ≥ 0.80 per dimension.
    cmd: >-
      uv run python -m src.annotation.run_calibrated_annotation
      --raw-input data/raw/synthetic_wearable_logs.jsonl
      --pre-cal-annotations data/annotations/pre_calibration/day12_annotations.jsonl
      --cal-config-path data/annotations/calibration_round_01.json
      --output data/annotations/post_calibration/annotations_round2.json
      --dry-run
    deps:
      - src/annotation/run_calibrated_annotation.py
      - src/annotation/calibration_protocol.py
      - src/annotation/annotator_simulator.py
      - src/annotation/irr_calculator.py
      - data/annotations/pre_calibration/day12_annotations.jsonl
      - data/annotations/wearable_annotation_rubric.md
      - data/annotations/calibration_round_01.json
    outs:
      - data/annotations/post_calibration/annotations_round2.json

  pia_trajectory_generation:
    desc: >-
      Generate 10 trajectory PAIRS (2 per scenario type) where Agent A
      reaches the goal via a direct 3-step path and Agent B via an
      indirect 4–5-step path with detour steps. Pairs are calibrated so
      standard path-comparison IRR yields κ ≈ 0.20–0.40 while PIA
      rubric-dimension agreement yields α ≥ 0.75 — the core empirical
      demonstration of Problem #3.
    cmd: >-
      uv run python -m src.annotation.pia_trajectory_generator
      --seed 42
      --output-dir data/trajectories/pia_pairs
    deps:
      - src/annotation/pia_trajectory_generator.py
      - src/data/privacy_gate.py
      - src/data/wearable_generator.py
    outs:
      - data/trajectories/pia_pairs/pair_01.json
      - data/trajectories/pia_pairs/pair_02.json
      - data/trajectories/pia_pairs/pair_03.json
      - data/trajectories/pia_pairs/pair_04.json
      - data/trajectories/pia_pairs/pair_05.json
      - data/trajectories/pia_pairs/pair_06.json
      - data/trajectories/pia_pairs/pair_07.json
      - data/trajectories/pia_pairs/pair_08.json
      - data/trajectories/pia_pairs/pair_09.json
      - data/trajectories/pia_pairs/pair_10.json
